# Test-specific configuration
quarkus.http.test-port=8081

# Kafka configuration for tests - use a mock/non-existent broker
# Tests will verify HTTP endpoint behavior, not actual Kafka delivery
kafka.bootstrap.servers=localhost:19092

# Kafka producer settings - fail fast and don't block tests
camel.component.kafka.request-timeout-ms=1000
camel.component.kafka.delivery-timeout-ms=1000
camel.component.kafka.max-block-ms=1000
camel.component.kafka.additional-properties[connections.max.idle.ms]=1000
camel.component.kafka.additional-properties[reconnect.backoff.ms]=50
camel.component.kafka.additional-properties[reconnect.backoff.max.ms]=100

# Disable SSL for tests
camel.component.kafka.security-protocol=PLAINTEXT
