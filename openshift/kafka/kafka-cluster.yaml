apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: fhir-cluster
spec:
  kafka:
    config:
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      default.replication.factor: 3
      min.insync.replicas: 2
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: tls
        port: 9093
        type: internal
        tls: true
    version: 4.2.0
    metadataVersion: "4.2"
  entityOperator:
    topicOperator: {}
    userOperator: {}
