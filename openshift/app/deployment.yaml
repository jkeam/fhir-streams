apiVersion: apps/v1
kind: Deployment
metadata:
  name: fhir-streams
  labels:
    app: fhir-streams
    app.kubernetes.io/name: fhir-streams
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fhir-streams
  template:
    metadata:
      labels:
        app: fhir-streams
    spec:
      containers:
      - name: fhir-streams
        image: image-registry.openshift-image-registry.svc:5000/fhir/fhir-streams:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          protocol: TCP
          name: http
        env:
        - name: QUARKUS_PROFILE
          value: "prod"
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "fhir-cluster-kafka-tls-bootstrap-fhir.apps.rosa.dha-test.zu23.p3.openshiftapps.com:443"
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /q/health/live
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /q/health/ready
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
