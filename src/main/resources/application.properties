# HTTP Configuration
quarkus.http.port=8080

# Kafka Configuration
%prod.kafka.bootstrap.servers=fhir-cluster-kafka-tls-bootstrap.fhir.svc.cluster.local:9092

# Camel Kafka TLS Configuration with truststore
%prod.camel.component.kafka.security-protocol=SSL
%prod.camel.component.kafka.additional-properties[ssl.truststore.location]=/deployments/config/kafka-truststore.jks
%prod.camel.component.kafka.additional-properties[ssl.truststore.password]=changeit
%prod.camel.component.kafka.additional-properties[ssl.truststore.type]=JKS
%prod.camel.component.kafka.additional-properties[ssl.endpoint.identification.algorithm]=

# Kafka Configuration - LOCAL
%dev.kafka.bootstrap.servers=localhost:9092
%dev.camel.component.kafka.security-protocol=PLAINTEXT

# Kafka Configuration - TEST (DevServices will override this)
%test.kafka.bootstrap.servers=localhost:19092

# Camel Configuration
camel.context.name=fhir-streams-context

# Logging
quarkus.log.level=INFO
quarkus.log.category."com.acme".level=DEBUG
quarkus.log.category."org.apache.kafka".level=DEBUG

# Enable Java SSL debugging (comment out after debugging)
quarkus.native.additional-build-args=-Djavax.net.debug=ssl:handshake
