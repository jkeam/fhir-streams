# Test Configuration
quarkus.http.test-port=8081

# Use Kafka DevServices (Testcontainers) for tests
quarkus.kafka.devservices.enabled=true
quarkus.kafka.devservices.topic-partitions.fhir-data=1

# Disable SSL for tests - use plain Kafka from DevServices
camel.component.kafka.security-protocol=PLAINTEXT
camel.component.kafka.ssl-truststore-location=
camel.component.kafka.ssl-truststore-password=
camel.component.kafka.additional-properties[ssl.endpoint.identification.algorithm]=
camel.component.kafka.additional-properties[ssl.truststore.location]=
camel.component.kafka.additional-properties[ssl.truststore.password]=
camel.component.kafka.additional-properties[ssl.truststore.type]=
